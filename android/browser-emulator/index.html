<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>openRS_ — Phone &amp; Android Auto Emulator</title>
  <style>
    /* ── Reset & base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      /* Ford theme colors */
      --nitrous-blue: #00AEEF;   /* Ford Nitrous Blue  */
      --frost-white:  #F5F6F4;   /* Ford Frost White   */

      --bg:     #0a0a0a;
      --surf:   #1a1a1a;
      --brd:    #2a2a2a;
      --txt:    #F5F6F4;         /* Frost White for all primary text */
      --dim:    #6a6e72;
      --accent: #00AEEF;         /* Nitrous Blue for all accents     */
      --grn:    #00e676;
      --red:    #ff5252;
      --org:    #ff9800;
      --gold:   #f8e63c;
      --mono:   'SF Mono','Consolas','Courier New',monospace;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--txt);
      font-family: var(--mono);
      font-size: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Switcher ─────────────────────────────────────── */
    #switcher {
      width: 100%;
      max-width: 500px;
      display: flex;
      gap: 8px;
      padding: 8px;
      background: var(--surf);
      border-bottom: 1px solid var(--brd);
    }
    #switcher button {
      flex: 1;
      padding: 9px;
      background: var(--brd);
      border: 1px solid var(--brd);
      color: var(--txt);
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 1px;
    }
    #switcher button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    /* ── Phone frame ──────────────────────────────────── */
    #phone {
      width: 100%;
      max-width: 420px;
      min-height: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    #phone.hidden, #aa.hidden { display: none; }

    /* Header */
    .ph-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      background: var(--surf);
      border-bottom: 1px solid var(--brd);
      gap: 6px;
    }
    .ph-brand { font-weight: 700; letter-spacing: 2px; font-size: 14px; }
    .brand-open { color: #F5F6F4; }
    .brand-rs   { color: #00AEEF; }
    .brand-tail { color: #F5F6F4; }
    .ph-badge {
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 700;
      color: #000;
    }
    .ph-badge.sport  { background: var(--grn); }
    .ph-badge.track  { background: var(--org); }
    .ph-badge.drift  { background: var(--red); }
    .ph-badge.normal { background: var(--accent); }
    .ph-gear { font-size: 20px; font-weight: 700; color: var(--accent); }
    .ph-esc  { font-size: 10px; color: var(--dim); }
    .ph-conn { font-size: 10px; font-weight: 700; cursor: pointer; }
    .ph-conn.on  { color: var(--grn); }
    .ph-conn.off { color: var(--red); }

    /* Tabs */
    .ph-tabs {
      display: flex;
      background: var(--surf);
      border-bottom: 1px solid var(--brd);
      height: 36px;
    }
    .ph-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--dim);
      cursor: pointer;
      position: relative;
      gap: 2px;
    }
    .ph-tab.active { color: var(--accent); background: rgba(0,168,232,0.08); }
    .ph-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* Pages */
    .ph-content { flex: 1; overflow-y: auto; padding: 8px; background: var(--bg); }
    .ph-page { display: none; }
    .ph-page.active { display: block; }

    /* ── Shared phone components ──────────────────────── */
    .gauge-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .gauge-box {
      flex: 1;
      background: var(--surf);
      border: 1px solid var(--brd);
      border-radius: 8px;
      padding: 8px;
      text-align: center;
    }
    .gauge-box.lg { flex: 1.5; }
    .g-lbl { font-size: 10px; color: var(--dim); letter-spacing: 1px; margin-bottom: 2px; }
    .g-val { font-size: 32px; font-weight: 700; line-height: 1.05; color: var(--txt); }
    .gauge-box.lg .g-val { font-size: 42px; }
    .g-unit { font-size: 10px; color: var(--dim); }

    .info-row { display: flex; gap: 6px; margin: 3px 0; }
    .cell {
      flex: 1;
      background: var(--surf);
      border: 1px solid var(--brd);
      border-radius: 6px;
      padding: 5px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-width: 0;
    }
    .c-lbl { font-size: 9px; color: var(--dim); white-space: nowrap; }
    .c-val { font-size: 12px; font-weight: 600; color: var(--txt); white-space: nowrap; }
    .c-val.gold { color: var(--gold); }
    .c-val.warm { color: var(--org); }
    .c-val.hot  { color: var(--red); }

    /* AWD */
    .sec-lbl { font-size: 11px; color: var(--dim); text-align: center; margin: 4px 0; }
    .axle-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 6px 0; }
    .wheel-box {
      width: 88px;
      background: var(--surf);
      border: 1px solid var(--brd);
      border-radius: 6px;
      padding: 6px;
      text-align: center;
    }
    .wb-lbl { font-size: 9px; color: var(--dim); }
    .wb-val { font-size: 16px; font-weight: 700; color: var(--txt); }
    .split-mid { text-align: center; }
    .split-val { font-size: 32px; font-weight: 700; color: var(--accent); }
    .split-sub { font-size: 9px; color: var(--dim); }
    .torque-bar {
      width: 100%; max-width: 300px; height: 18px;
      background: var(--brd); border-radius: 9px;
      display: flex; margin: 4px auto; overflow: hidden;
    }
    .tb-l { height: 100%; background: var(--accent); border-radius: 9px 0 0 9px; }
    .tb-r { height: 100%; background: var(--grn);    border-radius: 0 9px 9px 0; }

    /* Temps */
    .temp-gauge {
      flex: 1;
      background: var(--surf);
      border: 1px solid var(--brd);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .tg-lbl  { font-size: 10px; color: var(--dim); letter-spacing: 1px; margin-bottom: 4px; }
    .tg-val  { font-size: 36px; font-weight: 700; color: var(--txt); line-height: 1; }
    .tg-unit { font-size: 10px; color: var(--dim); margin-top: 2px; }

    /* RTR */
    .rtr {
      margin-top: 8px;
      padding: 12px;
      background: rgba(0,230,118,0.12);
      border: 1px solid var(--grn);
      border-radius: 8px;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      color: var(--grn);
      letter-spacing: 2px;
    }

    /* PERF */
    .reset-btn {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      background: var(--surf);
      border: 1px solid rgba(255,82,82,0.5);
      border-radius: 6px;
      color: var(--red);
      font-family: var(--mono);
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }

    /* TPMS */
    .tpms-hd  { font-size: 20px; font-weight: 700; color: var(--accent); text-align: center; margin-bottom: 4px; }
    .tpms-sub { font-size: 11px; color: var(--dim); text-align: center; margin-bottom: 12px; }
    .tire-row { display: flex; gap: 10px; justify-content: space-evenly; margin: 8px 0; }
    .tire-box {
      flex: 1;
      max-width: 180px;
      background: var(--surf);
      border: 2px solid var(--brd);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .tire-box.low { border-color: var(--red); }
    .tire-lbl  { font-size: 10px; color: var(--dim); letter-spacing: 1px; margin-bottom: 4px; }
    .tire-psi  { font-size: 38px; font-weight: 700; color: var(--txt); line-height: 1; }
    .tire-box.low .tire-psi { color: var(--red); }
    .tire-unit { font-size: 12px; color: var(--dim); }
    .tire-temp { font-size: 14px; color: var(--dim); margin-top: 4px; }

    /* ── Android Auto frame ───────────────────────────── */
    #aa {
      width: 100%;
      max-width: 820px;
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #111;
    }

    /* AA header bar — 3-col grid: brand | mode·gear·esc | conn */
    .aa-header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 10px 18px;
      background: var(--surf);
      border-bottom: 2px solid var(--brd);
    }
    .aa-header-left  { display: flex; align-items: center; gap: 10px; justify-content: flex-start; }
    .aa-header-center{ display: flex; align-items: center; gap: 10px; justify-content: center; }
    .aa-header-right { display: flex; align-items: center; gap: 10px; justify-content: flex-end; }
    .aa-title-txt { font-size: 18px; font-weight: 700; color: var(--txt); letter-spacing: 1px; }
    .aa-badge {
      padding: 3px 10px; border-radius: 4px;
      font-size: 12px; font-weight: 700; color: #000; letter-spacing: 1px;
    }
    .aa-badge.sport  { background: var(--grn); }
    .aa-badge.track  { background: var(--org); }
    .aa-badge.drift  { background: var(--red); }
    .aa-badge.normal { background: var(--accent); }
    .aa-gear { font-size: 22px; font-weight: 700; color: var(--accent); }
    .aa-esc  { font-size: 11px; color: var(--dim); }
    .aa-conn { font-size: 12px; font-weight: 700; }
    .aa-conn.on  { color: var(--grn); }
    .aa-conn.off { color: var(--red); }
    .aa-fps-note { font-size: 10px; color: var(--dim); }

    /* AA content */
    .aa-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* AA strip */
    .aa-strip {
      display: flex;
      gap: 10px;
      padding: 12px 18px;
      background: var(--surf);
      border-top: 2px solid var(--brd);
    }
    .aa-strip button {
      flex: 1;
      padding: 12px;
      background: var(--brd);
      border: none;
      color: var(--txt);
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s;
    }
    .aa-strip button:hover, .aa-strip button.active-nav { background: var(--accent); color: #000; }
    .aa-back-bar {
      padding: 8px 18px;
      background: var(--surf);
      border-bottom: 1px solid var(--brd);
    }
    .aa-back-bar button {
      padding: 7px 14px;
      background: transparent;
      border: 1px solid var(--dim);
      color: var(--txt);
      font-family: var(--mono);
      font-size: 13px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* AA menu list */
    .aa-menu-list { list-style: none; }
    .aa-menu-list li {
      padding: 16px;
      border-bottom: 1px solid var(--brd);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .aa-menu-list li:hover { background: var(--surf); }
    .aa-menu-tit  { font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
    .aa-menu-desc { font-size: 12px; color: var(--dim); }

    /* AA gauge grid (landscape 3-col) */
    .aa-gauge-row { display: flex; gap: 12px; }
    .aa-gauge-row .gauge-box .g-val { font-size: 38px; }
    .aa-gauge-row .gauge-box.lg .g-val { font-size: 52px; }

    /* AA info rows */
    .aa-info-row { display: flex; gap: 10px; }
    .aa-info-row .cell .c-lbl { font-size: 10px; }
    .aa-info-row .cell .c-val { font-size: 14px; }

    /* AA axle layout */
    .aa-axle { display: flex; align-items: center; gap: 20px; justify-content: center; margin: 6px 0; }
    .aa-axle .wheel-box { width: 110px; }
    .aa-axle .wb-val { font-size: 20px; }
    .aa-axle .split-val { font-size: 40px; }

    /* AA temp row */
    .aa-temp-row { display: flex; gap: 12px; }
    .aa-temp-row .temp-gauge .tg-val { font-size: 42px; }

    /* AA tire row */
    .aa-tire-row { display: flex; gap: 14px; justify-content: space-evenly; }
    .aa-tire-row .tire-box { max-width: none; flex: 1; }
    .aa-tire-row .tire-psi { font-size: 44px; }
  </style>
</head>
<body>

  <!-- Switcher -->
  <div id="switcher">
    <button id="btn-phone" class="active">📱 PHONE</button>
    <button id="btn-aa">🚗 ANDROID AUTO</button>
  </div>

  <!-- ════════ PHONE UI ════════ -->
  <div id="phone">
    <div class="ph-header">
      <span class="ph-brand"><span class="brand-open">open</span><span class="brand-rs">RS</span><span class="brand-tail">_</span></span>
      <span class="ph-badge sport" id="h-mode">SPORT</span>
      <span class="ph-gear" id="h-gear">3</span>
      <span class="ph-esc"  id="h-esc">ESC On</span>
      <span class="ph-conn on" id="h-conn">● CONNECTED</span>
    </div>
    <div class="ph-tabs" id="ph-tabs">
      <div class="ph-tab active" data-tab="0">DASH</div>
      <div class="ph-tab" data-tab="1">AWD</div>
      <div class="ph-tab" data-tab="2">PERF</div>
      <div class="ph-tab" data-tab="3">TEMPS</div>
      <div class="ph-tab" data-tab="4">TUNE</div>
      <div class="ph-tab" data-tab="5">TPMS</div>
    </div>
    <div class="ph-content">
      <div id="ph-dash"  class="ph-page active"></div>
      <div id="ph-awd"   class="ph-page"></div>
      <div id="ph-perf"  class="ph-page"></div>
      <div id="ph-temps" class="ph-page"></div>
      <div id="ph-tune"  class="ph-page"></div>
      <div id="ph-tpms"  class="ph-page"></div>
    </div>
  </div>

  <!-- ════════ ANDROID AUTO UI ════════ -->
  <div id="aa" class="hidden">
    <div class="aa-header">
      <div class="aa-header-left">
        <span class="aa-title-txt" id="aa-title">RS DASH</span>
      </div>
      <div class="aa-header-center">
        <span class="aa-badge sport" id="aa-mode-badge">SPORT</span>
        <span class="aa-gear" id="aa-gear">3</span>
        <span class="aa-esc"  id="aa-esc">ESC On</span>
      </div>
      <div class="aa-header-right">
        <span class="aa-conn on" id="aa-conn-badge">● CONNECTED</span>
        <span class="aa-fps-note" id="aa-fps">12 fps — CAN frames/s</span>
      </div>
    </div>
    <div class="aa-back-bar" id="aa-back-bar" style="display:none">
      <button id="aa-back-btn">← Back</button>
    </div>
    <div class="aa-body" id="aa-body"></div>
    <div class="aa-strip" id="aa-strip">
      <button data-screen="awd">AWD</button>
      <button data-screen="perf">PERF</button>
      <button data-screen="temps">TEMPS</button>
      <button data-screen="menu">MENU ☰</button>
    </div>
  </div>

<script>
/* ── Helpers ─────────────────────────────── */
const toF  = c => Math.round(c * 9 / 5 + 32);
const f1   = n => n.toFixed(1);
const f2   = n => n.toFixed(2);
const f3   = n => n.toFixed(3);
const ri   = n => Math.round(n);
const pct  = n => ri(n) + '%';

/* ── Demo state ───────────────────────────── */
function demo(t) {
  const rpm       = 2800 + Math.sin(t * 0.5) * 800;
  const boostPsi  = (Math.sin(t * 0.3) + 1) * 11.6;
  const speedKph  = 72 + Math.sin(t * 0.2) * 20;
  const speedMph  = speedKph * 0.621371;
  const thr       = 35 + Math.sin(t * 0.4) * 15;
  const brk       = 2 + Math.sin(t) * 0.5;
  const gear      = 3;
  const rearL     = 40 + Math.sin(t * 0.35) * 25;
  const rearR     = 35 + Math.sin(t * 0.4)  * 20;
  const total     = rearL + rearR;
  const rearPct   = total > 0 ? Math.min(100, total / 200 * 100) : 0;
  const oil       = 82 + Math.sin(t * 0.1)  * 3;
  const clnt      = 88 + Math.sin(t * 0.12) * 2;
  const rdu       = 45 + Math.sin(t * 0.15) * 5;
  const ptu       = 55 + Math.sin(t * 0.13) * 4;
  const latG      = Math.sin(t * 0.6) * 0.4;
  const lonG      = Math.cos(t * 0.5) * 0.3;
  const wFL = speedKph * 0.98 + Math.sin(t) * 1;
  const wFR = speedKph * 1.02 + Math.cos(t * 1.1) * 1;
  const wRL = speedKph * 0.97 + Math.sin(t * 0.9) * 1;
  const wRR = speedKph * 1.01 + Math.cos(t * 0.95) * 1;
  return {
    rpm, boostPsi, speedKph, speedMph,
    gear, gearDisplay: String(gear),
    throttlePct: thr, brakePressure: brk,
    frontRearSplit: (100 - ri(rearPct)) + '/' + ri(rearPct),
    torqueAtTrans: 220,
    oilTempC: oil, coolantTempC: clnt,
    intakeTempC: 32 + Math.sin(t * 0.2) * 5,
    ambientTempC: 22,
    batteryVoltage: 13.2 + Math.sin(t * 0.1) * 0.3,
    lateralG: latG, longitudinalG: lonG,
    combinedG: Math.sqrt(latG*latG + lonG*lonG),
    steeringAngle: Math.sin(t * 0.4) * 15,
    yawRate: Math.sin(t * 0.5) * 5,
    fuelLevelPct: 72,
    calcLoad: 45 + Math.sin(t) * 10,
    commandedAfr: 14.5 + Math.sin(t * 0.2) * 0.3,
    framesPerSecond: 12,
    wheelSpeedFL: wFL, wheelSpeedFR: wFR,
    wheelSpeedRL: wRL, wheelSpeedRR: wRR,
    awdLeftTorque: ri(rearL), awdRightTorque: ri(rearR),
    totalRearTorque: total, awdMaxTorque: 350,
    rduTempC: rdu, ptuTempC: ptu,
    rearLeftRightBias: total > 0
      ? ri(rearL/total*100)+'/'+ri(rearR/total*100) : '50/50',
    peakLateralG: 0.72, peakLongitudinalG: 0.55,
    peakBoostPsi: 18.2, peakRpm: 6200,
    chargeAirTempC: 38, catalyticTempC: 420,
    afrActual: 14.4 + Math.sin(t*0.2)*0.2, afrDesired: 14.7,
    lambdaActual: 0.98 + Math.sin(t*0.1)*0.02,
    etcAngleActual: 45 + Math.sin(t)*5, etcAngleDesired: 48,
    tipActualPsi: 12 + Math.sin(t*0.3)*2, tipDesiredPsi: 13.5,
    wgdcDesired: 55 + Math.sin(t*0.4)*15,
    timingAdvance: 18 + Math.sin(t*0.2)*2,
    shortFuelTrim: 2.1 + Math.sin(t)*0.5,
    longFuelTrim: -0.8 + Math.cos(t*0.7)*0.3,
    fuelRailPsi: 42 + Math.sin(t*0.5)*3,
    vctIntakeAngle: 25 + Math.sin(t*0.2)*5,
    vctExhaustAngle: 20 + Math.cos(t*0.2)*3,
    octaneAdjustRatio: 0.98, barometricPressure: 101,
    oilLifePct: 67, ignCorrCyl1: 0.00,
    tirePressLF: 35, tirePressRF: 34,
    tirePressLR: 36, tirePressRR: 35,
    tireTempLF: 28, tireTempRF: 27,
    tireTempLR: 29, tireTempRR: 28,
    maxTirePressSpread: 2,
    hasTpmsData: true, anyTireLow: false,
    isReadyToRace: oil >= 65 && rdu >= 20 && ptu >= 50,
    isConnected: true, driveMode: 'Sport', escStatus: 'ESC On'
  };
}

/* ── HTML builders ────────────────────────── */
function gaugeBox(lbl, val, unit, large = false) {
  return `<div class="gauge-box${large?' lg':''}">
    <div class="g-lbl">${lbl}</div>
    <div class="g-val">${val}</div>
    ${unit ? `<div class="g-unit">${unit}</div>` : ''}
  </div>`;
}
function cell(lbl, val, cls = '') {
  return `<div class="cell"><span class="c-lbl">${lbl}</span><span class="c-val${cls?' '+cls:''}">${val}</span></div>`;
}
function infoRow(pairs) {
  return `<div class="info-row">${pairs.map(([l,v,c])=>cell(l,v,c)).join('')}</div>`;
}
function tempGauge(lbl, val, unit, cls = '') {
  return `<div class="temp-gauge">
    <div class="tg-lbl">${lbl}</div>
    <div class="tg-val${cls?' '+cls:''}">${val}</div>
    <div class="tg-unit">${unit}</div>
  </div>`;
}
function wheelBox(lbl, val) {
  return `<div class="wheel-box"><div class="wb-lbl">${lbl}</div><div class="wb-val">${val}</div></div>`;
}

/* ── Phone pages ──────────────────────────── */
function dashHtml(v) {
  return `
    <div class="gauge-row">
      ${gaugeBox('BOOST', f1(v.boostPsi), 'PSI')}
      ${gaugeBox('RPM',   ri(v.rpm),      '',    true)}
      ${gaugeBox('SPEED', ri(v.speedMph), 'MPH')}
    </div>
    ${infoRow([['THROTTLE', pct(v.throttlePct)],['BRAKE', f1(v.brakePressure)],['AWD', v.frontRearSplit],['TORQUE', ri(v.torqueAtTrans)+' Nm']])}

/* ── State & render loop ──────────────────── */
let vs = demo(0);
let activePhoneTab = 0;
let aaScreen = 'dash';

function renderPhone() {
  const v = vs;
  // header
  const modeLabel = {Sport:'SPORT', Track:'TRACK', Drift:'DRIFT'}[v.driveMode] || 'NORMAL';
  const modeCls   = {Sport:'sport', Track:'track',  Drift:'drift'}[v.driveMode] || 'normal';
  document.getElementById('h-mode').textContent = modeLabel;
  document.getElementById('h-mode').className   = 'ph-badge ' + modeCls;
  document.getElementById('h-gear').textContent = v.gearDisplay;
  document.getElementById('h-esc' ).textContent = v.escStatus;
  document.getElementById('h-conn').textContent = v.isConnected ? '● CONNECTED' : '● OFFLINE';
  document.getElementById('h-conn').className   = 'ph-conn ' + (v.isConnected ? 'on' : 'off');
  // pages
  document.getElementById('ph-dash' ).innerHTML = dashHtml(v);
  document.getElementById('ph-awd'  ).innerHTML = awdHtml(v);
  document.getElementById('ph-perf' ).innerHTML = perfHtml(v);
  document.getElementById('ph-temps').innerHTML = tempsHtml(v);
  document.getElementById('ph-tune' ).innerHTML = tuneHtml(v);
  document.getElementById('ph-tpms' ).innerHTML = tpmsHtml(v);
}

function renderAA() {
  const v = vs;
  const titleEl   = document.getElementById('aa-title');
  const backBar   = document.getElementById('aa-back-bar');
  const bodyEl    = document.getElementById('aa-body');
  const stripEl   = document.getElementById('aa-strip');

  // header
  const modeLabel = {Sport:'SPORT', Track:'TRACK', Drift:'DRIFT'}[v.driveMode] || 'NORMAL';
  const modeCls   = {Sport:'sport', Track:'track',  Drift:'drift'}[v.driveMode] || 'normal';
  document.getElementById('aa-mode-badge').textContent = modeLabel;
  document.getElementById('aa-mode-badge').className   = 'aa-badge ' + modeCls;
  document.getElementById('aa-gear').textContent = v.gearDisplay;
  document.getElementById('aa-esc' ).textContent = v.escStatus;
  const connEl = document.getElementById('aa-conn-badge');
  connEl.textContent = v.isConnected ? '● CONNECTED' : '○ OFFLINE';
  connEl.className   = 'aa-conn ' + (v.isConnected ? 'on' : 'off');
  document.getElementById('aa-fps').textContent = ri(v.framesPerSecond) + ' fps — CAN frames/s';

  const isMenu = aaScreen === 'menu';
  backBar.style.display  = isMenu || aaScreen !== 'dash' ? 'block' : 'none';
  stripEl.style.display  = isMenu ? 'none' : 'flex';

  const brandHtml = '<span class="brand-open">open</span><span class="brand-rs">RS</span><span class="brand-tail">_</span>';
  const screenMap = {
    dash:  [brandHtml,                                    aaDash(v)],
    awd:   ['AWD — GKN Twinster',                         aaAwd(v)],
    perf:  ['PERF',                                       aaPerf(v)],
    temps: ['TEMPS',                                      aaTemps(v)],
    tune:  ['TUNE — OBD',                                 aaTune(v)],
    tpms:  ['TPMS+',                                      aaTpms(v)],
    menu:  [brandHtml + ' <span style="color:var(--dim);font-size:14px">MENU</span>', aaMenu()],
  };

  const [title, html] = screenMap[aaScreen] || screenMap.dash;
  titleEl.innerHTML = title;
  bodyEl.innerHTML = html;

  // highlight active strip button
  stripEl.querySelectorAll('button').forEach(btn => {
    btn.classList.toggle('active-nav', btn.dataset.screen === aaScreen);
  });

  // menu list click
  if (aaScreen === 'menu') {
    bodyEl.querySelectorAll('li').forEach(li => {
      li.addEventListener('click', () => { aaScreen = li.dataset.screen; renderAA(); });
    });
  }

  // reset peaks (perf)
  const rBtn = document.getElementById('aa-reset-btn');
  if (rBtn) rBtn.addEventListener('click', () => {
    vs = {...vs, peakLateralG:0, peakLongitudinalG:0, peakBoostPsi:0, peakRpm:0};
    renderAA();
  });
}

/* ── Intervals & events ───────────────────── */
setInterval(() => {
  vs = demo(Date.now() / 1000);
  renderPhone();
  if (!document.getElementById('aa').classList.contains('hidden')) renderAA();
}, 200);

// Phone tabs
document.getElementById('ph-tabs').addEventListener('click', e => {
  const tab = e.target.closest('.ph-tab');
  if (!tab) return;
  activePhoneTab = parseInt(tab.dataset.tab, 10);
  document.querySelectorAll('.ph-tab').forEach((t, i) => t.classList.toggle('active', i === activePhoneTab));
  document.querySelectorAll('.ph-page').forEach((p, i) => p.classList.toggle('active', i === activePhoneTab));
});

// Phone reset peaks
document.querySelector('.ph-content').addEventListener('click', e => {
  if (e.target.id === 'reset-peaks-btn') {
    vs = {...vs, peakLateralG:0, peakLongitudinalG:0, peakBoostPsi:0, peakRpm:0};
    renderPhone();
  }
});

// AA strip
document.getElementById('aa-strip').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  aaScreen = btn.dataset.screen;
  renderAA();
});

// AA back
document.getElementById('aa-back-btn').addEventListener('click', () => {
  aaScreen = 'dash';
  renderAA();
});

// Mode switcher
document.getElementById('btn-phone').addEventListener('click', () => {
  document.getElementById('btn-phone').classList.add('active');
  document.getElementById('btn-aa').classList.remove('active');
  document.getElementById('phone').classList.remove('hidden');
  document.getElementById('aa').classList.add('hidden');
});
document.getElementById('btn-aa').addEventListener('click', () => {
  document.getElementById('btn-aa').classList.add('active');
  document.getElementById('btn-phone').classList.remove('active');
  document.getElementById('phone').classList.add('hidden');
  document.getElementById('aa').classList.remove('hidden');
  aaScreen = 'dash';
  renderAA();
});

// Initial render
renderPhone();
</script>
</body>
</html>
