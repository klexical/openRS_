name: CI

on:
  push:
    branches: [ main, staging ]
    tags: [ 'android-v*' ]
  pull_request:
    branches: [ main, staging ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: openRS-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run lint
        run: chmod +x gradlew && ./gradlew lint --no-daemon

  release:
    name: Release APK
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [ build, lint ]
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build release APK
        run: chmod +x gradlew && ./gradlew assembleRelease --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: openRS-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

  publish-release:
    name: Attach APK to GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/android-v')
    needs: [ build, lint ]
    permissions:
      contents: write
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::Keystore secrets not configured — APK will be unsigned"
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > openrs-release.jks
          printf 'storeFile=openrs-release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$KEYSTORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" > keystore.properties

      - name: Build release APK
        run: chmod +x gradlew && ./gradlew assembleRelease --no-daemon

      - name: Find release APK
        id: apk
        run: |
          APK=$(ls android/app/build/outputs/apk/release/openRS_v*.apk 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No release APK found in android/app/build/outputs/apk/release/"
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK"
        working-directory: .

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}

  verify-firmware:
    name: Verify Firmware Binaries
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for manifest files
        id: check
        run: |
          if ls firmware/release/BUILD_MANIFEST_*.json 1>/dev/null 2>&1; then
            echo "has_manifest=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_manifest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify firmware binaries match manifest
        if: steps.check.outputs.has_manifest == 'true'
        run: bash firmware/verify-release.sh

      - name: Fail if binaries exist without manifest
        run: |
          for bin in firmware/release/openrs-fw-*.bin; do
            [ -f "$bin" ] || continue
            NAME=$(basename "$bin")
            TARGET_HINT=$(echo "$NAME" | sed -n 's/openrs-fw-\(usb\|pro\)_.*/\1/p')
            if [ -n "$TARGET_HINT" ] && [ ! -f "firmware/release/BUILD_MANIFEST_${TARGET_HINT}.json" ]; then
              echo "::error::$NAME exists but BUILD_MANIFEST_${TARGET_HINT}.json is missing — binary may be stale. Rebuild with: ./build.sh --target $TARGET_HINT"
              exit 1
            fi
          done
          echo "All firmware binaries have matching manifests."
